name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt
      - name: Lint (ruff check)
        run: cd backend && ruff check .
      - name: Format check (ruff format)
        run: cd backend && ruff format --check .
      - name: Type check (mypy --strict)
        run: cd backend && mypy app/
      - name: Security audit (bandit)
        run: cd backend && bandit -r app/ -ll
      - name: Dependency CVE scan (pip-audit)
        run: cd backend && pip-audit -r requirements.txt
      - name: Tests with coverage
        run: cd backend && pytest --cov=app --cov-report=xml --cov-report=term-missing -v
        env:
          USE_GEMINI: "false"
          USE_FIRESTORE: "false"
          USE_BIGQUERY: "false"
          USE_PUBSUB: "false"
          PROJECT_ID: test-project

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Type check
        run: cd frontend && npm run typecheck
      - name: Lint
        run: cd frontend && npm run lint
      - name: Tests
        run: cd frontend && npm test
      - name: Build
        run: cd frontend && npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t carbon-platform .
      - name: Health check smoke test
        run: |
          docker run -d -p 8080:8080 \
            -e USE_GEMINI=false -e USE_FIRESTORE=false \
            -e USE_BIGQUERY=false -e USE_PUBSUB=false \
            -e PROJECT_ID=test --name test-container carbon-platform
          sleep 10
          curl -f http://localhost:8080/api/health
          docker stop test-container
